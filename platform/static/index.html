<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Platform</title>
  <style>
    :root {
      --bg-0: #f4efe9;
      --bg-1: #e6f0ec;
      --card: rgba(255, 255, 255, 0.86);
      --ink: #1f2831;
      --muted: #5f6b78;
      --line: rgba(31, 40, 49, 0.14);
      --accent: #2f7a5f;
      --on-bg: #d5f2e5;
      --on-fg: #186246;
      --off-bg: #eceef0;
      --off-fg: #6c7782;
      --warn-bg: #fce8e4;
      --warn-fg: #9d4425;
      --wait-bg: #fef3cd;
      --wait-fg: #856404;
      --offhours-bg: #e8e0f0;
      --offhours-fg: #5b3a8c;
      --human-bg: #dff3e7;
      --agent-bg: #f4f4f1;
    }
    .hidden { display: none !important; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 12% 10%, rgba(47, 122, 95, 0.16), transparent 45%),
        radial-gradient(circle at 85% 90%, rgba(185, 122, 91, 0.16), transparent 48%),
        linear-gradient(140deg, var(--bg-0), var(--bg-1));
    }
    .app {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 16px 40px;
      min-width: 0;
    }
    .app-wide { max-width: 1380px; }
    .top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    h1 { margin: 2px 0 0; font-size: clamp(1.6rem, 3vw, 2rem); }
    .kicker {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      margin: 12px 0;
      min-width: 0;
      background: var(--card);
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 30px rgba(25, 38, 32, 0.07);
    }
    .panel-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    h2, h3 { margin: 0; font-size: 1.02rem; }
    .meta { color: var(--muted); font-size: 12px; }
    button {
      border: none;
      border-radius: 10px;
      padding: 9px 14px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
    }
    button:hover { filter: brightness(0.95); }
    button.warn { background: #9d4425; }
    button.secondary {
      background: var(--off-bg);
      color: var(--ink);
    }
    button:disabled { opacity: 0.7; cursor: not-allowed; }
    .badge {
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
      display: inline-block;
    }
    .badge.on { background: var(--on-bg); color: var(--on-fg); }
    .badge.off { background: var(--off-bg); color: var(--off-fg); }
    .badge.warn { background: var(--warn-bg); color: var(--warn-fg); }
    .badge.wait { background: var(--wait-bg); color: var(--wait-fg); }
    .badge.offhours { background: var(--offhours-bg); color: var(--offhours-fg); }

    /* ── LLM Quota ── */
    .usage-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .usage-card {
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.58);
    }
    .usage-title {
      font-weight: 700;
      font-size: 13px;
      color: var(--ink);
      margin-bottom: 6px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }
    .usage-title .sub {
      font-weight: 500;
      font-size: 11px;
      color: var(--muted);
    }
    .usage-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      margin: 4px 0 2px;
      color: var(--ink);
    }
    .usage-row .label {
      color: var(--muted);
      min-width: 86px;
    }
    .usage-bar {
      flex: 1;
      height: 8px;
      border-radius: 4px;
      background: var(--off-bg);
      overflow: hidden;
    }
    .usage-bar .fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.3s;
    }
    .usage-bar .fill.warn { background: #e6a817; }
    .usage-bar .fill.danger { background: #c0392b; }
    .usage-row .val {
      min-width: 40px;
      text-align: right;
      font-weight: 700;
      font-size: 12px;
    }
    .usage-reset {
      font-size: 11px;
      color: var(--muted);
      margin: 0 0 6px 94px;
    }
    .usage-section {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .usage-empty {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
    }
    @media (max-width: 640px) {
      .usage-grid { grid-template-columns: 1fr; }
    }

    /* ── Agent Cards ── */
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      min-width: 0;
    }
    .agent-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fff;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.15s;
      position: relative;
      min-width: 0;
      max-width: 100%;
    }
    .agent-card,
    .agent-card-name,
    .agent-card-info,
    .agent-card-msg,
    .msg-meta,
    .bubble {
      user-select: text;
      -webkit-user-select: text;
    }
    .agent-card:hover {
      box-shadow: 0 8px 24px rgba(25, 38, 32, 0.12);
      transform: translateY(-2px);
    }
    .agent-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      min-width: 0;
    }
    .agent-card-name {
      font-weight: 700;
      font-size: 15px;
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .agent-card-info {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      overflow-wrap: anywhere;
    }
    .agent-card-msg {
      font-size: 13px;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed var(--line);
    }
    .agent-card-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 6px;
      background: var(--off-bg);
      color: var(--off-fg);
    }
    .agent-card-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--line);
    }
    .card-btn {
      flex: 1 1 96px;
      min-width: 0;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      border-radius: 6px;
      background: var(--off-bg);
      color: var(--ink);
      border: none;
      cursor: pointer;
    }
    .card-btn:hover { background: #dde0e3; }
    .card-btn.start { background: var(--on-bg); color: var(--on-fg); }
    .card-btn.start:hover { background: #b8e6cc; }
    .card-btn.danger { color: #c0392b; }
    .card-btn.danger:hover { background: var(--warn-bg); }

    /* ── Detail Page ── */
    .detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .detail-header .back-btn {
      background: var(--off-bg);
      color: var(--ink);
      padding: 6px 12px;
      font-size: 13px;
    }
    .goal-chip-wrap {
      position: relative;
      display: inline-flex;
      flex-shrink: 0;
    }
    .goal-chip {
      background: var(--off-bg);
      color: var(--ink);
      padding: 5px 10px;
      font-size: 12px;
      border-radius: 999px;
    }
    .goal-popover {
      display: none;
      position: absolute;
      z-index: 20;
      top: calc(100% + 8px);
      left: 0;
      width: min(520px, 80vw);
      max-height: 280px;
      overflow: auto;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 12px 36px rgba(31, 40, 49, 0.18);
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .goal-chip-wrap:hover .goal-popover,
    .goal-chip-wrap.open .goal-popover {
      display: block;
    }
    .detail-status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .detail-fact {
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.58);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
    }
    .detail-fact strong { font-weight: 700; }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .metric-card {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.58);
      min-width: 0;
    }
    .metric-card h3 {
      margin-bottom: 8px;
      font-size: 13px;
    }
    .metric-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      padding: 5px 0;
      border-top: 1px solid rgba(31, 40, 49, 0.08);
      font-size: 12px;
      min-width: 0;
    }
    .metric-row span {
      color: var(--muted);
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .metric-row strong {
      text-align: right;
      overflow-wrap: anywhere;
    }
    .history {
      max-height: 50vh;
      overflow: auto;
      display: grid;
      gap: 10px;
      padding-right: 4px;
    }
    .msg { display: grid; gap: 4px; }
    .msg.human { justify-items: end; }
    .msg.agent { justify-items: start; }
    .msg-meta { color: var(--muted); font-size: 12px; }
    .bubble {
      max-width: min(780px, 100%);
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 10px 12px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
      box-shadow: 0 5px 16px rgba(31, 40, 49, 0.06);
    }
    .bubble.human { background: var(--human-bg); }
    .bubble.agent { background: var(--agent-bg); }
    .tabs {
      display: inline-flex;
      gap: 4px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
    }
    .tab {
      padding: 5px 10px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
    }
    .memory-date-filter {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(116px, 1fr));
      gap: 6px;
      max-height: 156px;
      overflow: auto;
      padding: 8px 0;
      margin-bottom: 8px;
      border-bottom: 1px dashed var(--line);
    }
    .date-chip {
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--off-bg);
      color: var(--ink);
      font-size: 11px;
    }
    .date-chip.active {
      background: var(--accent);
      color: #fff;
    }
    .memory-layout {
      display: grid;
      grid-template-columns: minmax(300px, 36%) minmax(0, 1fr);
      gap: 12px;
      min-height: 70vh;
    }
    .memory-tabs { width: 100%; margin-bottom: 8px; }
    .memory-tabs .tab { flex: 1; }
    .memory-entry-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .memory-list {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.5);
      overflow: auto;
      max-height: 72vh;
      padding: 6px;
      min-width: 0;
    }
    .memory-date-separator {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 5px 7px;
      margin: 2px 0 5px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }
    .memory-item {
      width: 100%;
      display: grid;
      gap: 3px;
      text-align: left;
      padding: 8px;
      margin-bottom: 5px;
      border-radius: 7px;
      background: transparent;
      color: var(--ink);
      font-weight: 500;
    }
    .memory-item:hover,
    .memory-item.active {
      background: var(--off-bg);
      filter: none;
    }
    .memory-item-title {
      font-size: 13px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .memory-item-path,
    .memory-item-meta {
      color: var(--muted);
      font-size: 11px;
      overflow-wrap: anywhere;
    }
    .memory-content {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.68);
      min-width: 0;
      max-height: 72vh;
      overflow: auto;
    }
    .memory-file-head {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .memory-markdown {
      margin: 0;
      padding: 12px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    .memory-empty {
      padding: 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .memory-load-more {
      width: 100%;
      background: var(--off-bg);
      color: var(--ink);
      padding: 7px 10px;
      font-size: 12px;
      border-radius: 7px;
    }
    textarea {
      width: 100%;
      min-height: 100px;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 12px;
      font: inherit;
      color: inherit;
      background: rgba(255, 255, 255, 0.86);
      resize: vertical;
    }
    .row { margin-top: 10px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    input[type="text"], select {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 12px;
      font: inherit;
      font-size: 14px;
      color: var(--ink);
      background: #fff;
      width: 100%;
    }
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--muted);
    }

    /* ── Schedule row ── */
    .sched-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      flex-wrap: wrap;
      font-size: 12px;
    }
    .sched-row input[type="time"] {
      padding: 3px 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font: inherit;
      font-size: 12px;
      width: 90px;
    }
    .sched-day {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 2px 5px;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      font-size: 11px;
      font-weight: 700;
      background: var(--off-bg);
      color: var(--off-fg);
    }
    .sched-day.active {
      background: var(--accent);
      color: #fff;
    }
    .sched-del {
      cursor: pointer;
      color: #c0392b;
      font-weight: 700;
      font-size: 14px;
      padding: 0 4px;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      width: min(520px, 90vw);
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal h2 { margin-bottom: 16px; }

    @media (max-width: 760px) {
      .top { align-items: flex-start; flex-direction: column; }
      .top-actions { width: 100%; }
      .top-actions .meta { width: 100%; }
      .agents-grid { grid-template-columns: 1fr; }
      .detail-status-grid { grid-template-columns: 1fr; }
      .metric-grid { grid-template-columns: 1fr; }
      .memory-layout { grid-template-columns: 1fr; }
      .memory-list,
      .memory-content { max-height: 45vh; }
      .detail-header {
        align-items: flex-start;
        flex-wrap: wrap;
      }
      .detail-header > h1 {
        width: 100%;
        overflow-wrap: anywhere;
      }
      .detail-header > div[style*="flex:1"] {
        display: none;
      }
      .panel-head {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 480px) {
      .app {
        padding: 16px 10px 28px;
      }
      .panel {
        padding: 12px;
        border-radius: 14px;
      }
      .agent-card {
        padding: 12px;
      }
      .agent-card-top {
        align-items: flex-start;
        flex-wrap: wrap;
      }
      .agent-card-name {
        white-space: normal;
        overflow: visible;
        text-overflow: unset;
      }
      .badge {
        max-width: 100%;
        flex-shrink: 0;
      }
      .agent-card-info,
      .agent-card-msg {
        white-space: normal;
        word-break: break-word;
      }
      .card-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/static/app/main.js"></script>
</body>
</html>
