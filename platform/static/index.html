<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Platform</title>
  <style>
    :root {
      --bg-0: #f4efe9;
      --bg-1: #e6f0ec;
      --card: rgba(255, 255, 255, 0.86);
      --ink: #1f2831;
      --muted: #5f6b78;
      --line: rgba(31, 40, 49, 0.14);
      --accent: #2f7a5f;
      --on-bg: #d5f2e5;
      --on-fg: #186246;
      --off-bg: #eceef0;
      --off-fg: #6c7782;
      --warn-bg: #fce8e4;
      --warn-fg: #9d4425;
      --wait-bg: #fef3cd;
      --wait-fg: #856404;
      --offhours-bg: #e8e0f0;
      --offhours-fg: #5b3a8c;
      --human-bg: #dff3e7;
      --agent-bg: #f4f4f1;
    }
    .hidden { display: none !important; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(47, 122, 95, 0.16), transparent 45%),
        radial-gradient(circle at 85% 90%, rgba(185, 122, 91, 0.16), transparent 48%),
        linear-gradient(140deg, var(--bg-0), var(--bg-1));
    }
    .app {
      width: min(1100px, 100%);
      margin: 0 auto;
      padding: 28px 16px 40px;
    }
    .top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    h1 { margin: 2px 0 0; font-size: clamp(1.6rem, 3vw, 2rem); }
    .kicker {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      margin: 12px 0;
      background: var(--card);
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 30px rgba(25, 38, 32, 0.07);
    }
    .panel-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    h2, h3 { margin: 0; font-size: 1.02rem; }
    .meta { color: var(--muted); font-size: 12px; }
    button {
      border: none;
      border-radius: 10px;
      padding: 9px 14px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
    }
    button:hover { filter: brightness(0.95); }
    button.warn { background: #9d4425; }
    button.secondary {
      background: var(--off-bg);
      color: var(--ink);
    }
    button:disabled { opacity: 0.7; cursor: not-allowed; }
    .badge {
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
      display: inline-block;
    }
    .badge.on { background: var(--on-bg); color: var(--on-fg); }
    .badge.off { background: var(--off-bg); color: var(--off-fg); }
    .badge.warn { background: var(--warn-bg); color: var(--warn-fg); }
    .badge.wait { background: var(--wait-bg); color: var(--wait-fg); }
    .badge.offhours { background: var(--offhours-bg); color: var(--offhours-fg); }

    /* ── Rate Limit ── */
    .rl-status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .rl-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .rl-dot.ok { background: var(--accent); }
    .rl-dot.warning { background: #e6a817; }
    .rl-dot.danger { background: #c0392b; }
    .rl-status-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ink);
    }
    .rl-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Agent Cards ── */
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .agent-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fff;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.15s;
      position: relative;
    }
    .agent-card,
    .agent-card-name,
    .agent-card-info,
    .agent-card-msg,
    .msg-meta,
    .bubble {
      user-select: text;
      -webkit-user-select: text;
    }
    .agent-card:hover {
      box-shadow: 0 8px 24px rgba(25, 38, 32, 0.12);
      transform: translateY(-2px);
    }
    .agent-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .agent-card-name {
      font-weight: 700;
      font-size: 15px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .agent-card-info {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .agent-card-msg {
      font-size: 13px;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed var(--line);
    }
    .agent-card-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 6px;
      background: var(--off-bg);
      color: var(--off-fg);
    }
    .agent-card-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--line);
    }
    .card-btn {
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      border-radius: 6px;
      background: var(--off-bg);
      color: var(--ink);
      border: none;
      cursor: pointer;
    }
    .card-btn:hover { background: #dde0e3; }
    .card-btn.start { background: var(--on-bg); color: var(--on-fg); }
    .card-btn.start:hover { background: #b8e6cc; }
    .card-btn.danger { color: #c0392b; }
    .card-btn.danger:hover { background: var(--warn-bg); }
    .dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      min-width: 140px;
      z-index: 10;
      overflow: hidden;
    }
    .dropdown-item {
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      color: var(--ink);
      font-family: inherit;
    }
    .dropdown-item:hover { background: var(--off-bg); }
    .dropdown-item.danger { color: #c0392b; }

    /* ── Detail Page ── */
    .detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .detail-header .back-btn {
      background: var(--off-bg);
      color: var(--ink);
      padding: 6px 12px;
      font-size: 13px;
    }
    .detail-status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .detail-fact {
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.58);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
    }
    .detail-fact strong { font-weight: 700; }
    .history {
      max-height: 50vh;
      overflow: auto;
      display: grid;
      gap: 10px;
      padding-right: 4px;
    }
    .msg { display: grid; gap: 4px; }
    .msg.human { justify-items: end; }
    .msg.agent { justify-items: start; }
    .msg-meta { color: var(--muted); font-size: 12px; }
    .bubble {
      max-width: min(780px, 100%);
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 10px 12px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
      box-shadow: 0 5px 16px rgba(31, 40, 49, 0.06);
    }
    .bubble.human { background: var(--human-bg); }
    .bubble.agent { background: var(--agent-bg); }
    textarea {
      width: 100%;
      min-height: 100px;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 12px;
      font: inherit;
      color: inherit;
      background: rgba(255, 255, 255, 0.86);
      resize: vertical;
    }
    .row { margin-top: 10px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    input[type="text"], select {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 12px;
      font: inherit;
      font-size: 14px;
      color: var(--ink);
      background: #fff;
      width: 100%;
    }
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--muted);
    }

    /* ── Schedule row ── */
    .sched-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      flex-wrap: wrap;
      font-size: 12px;
    }
    .sched-row input[type="time"] {
      padding: 3px 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font: inherit;
      font-size: 12px;
      width: 90px;
    }
    .sched-day {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 2px 5px;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      font-size: 11px;
      font-weight: 700;
      background: var(--off-bg);
      color: var(--off-fg);
    }
    .sched-day.active {
      background: var(--accent);
      color: #fff;
    }
    .sched-del {
      cursor: pointer;
      color: #c0392b;
      font-weight: 700;
      font-size: 14px;
      padding: 0 4px;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      width: min(520px, 90vw);
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal h2 { margin-bottom: 16px; }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      user-select: none;
    }
    .toggle input { accent-color: var(--accent); }

    @media (max-width: 760px) {
      .top { align-items: flex-start; flex-direction: column; }
      .agents-grid { grid-template-columns: 1fr; }
      .detail-status-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<main class="app">
  <!-- ══════════ Dashboard View ══════════ -->
  <div id="dashboardView">
    <header class="top">
      <div>
        <p class="kicker">Dashboard</p>
        <h1>Agent Platform</h1>
      </div>
      <div class="top-actions">
        <label class="toggle">
          <input id="autoSync" type="checkbox" checked onchange="toggleAutoSync()" />
          Auto Sync
        </label>
        <span id="syncMeta" class="meta"></span>
        <button onclick="showImportModal()">Import</button>
        <button onclick="showCreateModal()">+ New Agent</button>
      </div>
    </header>

    <!-- Rate Limit -->
    <section id="rateLimitPanel" class="panel hidden">
      <div class="panel-head">
        <h2>Claude Rate Limit</h2>
        <span id="rlSource" class="meta"></span>
      </div>
      <div class="rl-status-row">
        <div id="rlDot" class="rl-dot ok"></div>
        <span id="rlStatusLabel" class="rl-status-label">--</span>
      </div>
      <div class="rl-meta">
        <span id="rlType"></span>
        <span id="rlReset"></span>
      </div>
    </section>

    <!-- Agent Cards -->
    <section class="panel">
      <div class="panel-head">
        <h2>Agents</h2>
        <span id="agentCount" class="meta"></span>
      </div>
      <div id="agentsGrid" class="agents-grid"></div>
    </section>

    <!-- Agent Connections -->
    <section class="panel">
      <div class="panel-head">
        <h2>Agent Connections</h2>
        <span id="connCount" class="meta"></span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
        <select id="connAgentA" style="padding:4px 8px;border:1px solid var(--line);border-radius:6px;font:inherit;font-size:13px"></select>
        <span style="color:var(--muted)">&harr;</span>
        <select id="connAgentB" style="padding:4px 8px;border:1px solid var(--line);border-radius:6px;font:inherit;font-size:13px"></select>
        <button onclick="doConnect()" style="padding:4px 10px;font-size:12px">Connect</button>
        <span id="connResult" class="meta"></span>
      </div>
      <div id="connList"></div>
    </section>
  </div>

  <!-- ══════════ Agent Detail View ══════════ -->
  <div id="detailView" class="hidden">
    <div class="detail-header">
      <button class="back-btn" onclick="showDashboard()">&larr; Back</button>
      <h1 id="detailName"></h1>
      <span id="detailBadge" class="badge"></span>
      <div style="flex:1"></div>
      <button id="detailStartBtn" class="hidden" onclick="detailStart()">Start</button>
      <button id="detailStopBtn" class="warn" onclick="detailStop()">Stop</button>
      <button class="warn" onclick="detailDelete()">Delete</button>
    </div>

    <section class="panel">
      <div class="panel-head">
        <h2>Status</h2>
        <span id="detailHeartbeat" class="meta"></span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px">
        <span style="color:var(--muted);font-weight:700">Interval</span>
        <input id="intervalInput" type="number" min="1" value="20"
          style="width:60px;padding:4px 6px;border:1px solid var(--line);border-radius:6px;font:inherit;font-size:13px;text-align:right" />
        <span>min</span>
        <button onclick="setInterval_()" style="padding:4px 10px;font-size:12px">Set</button>
        <span id="intervalResult" class="meta"></span>
      </div>
      <div id="detailFacts" class="detail-status-grid"></div>

      <div style="margin-top:14px;border-top:1px dashed var(--line);padding-top:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="color:var(--muted);font-weight:700;font-size:13px">Work Schedule</span>
          <span id="scheduleResult" class="meta"></span>
        </div>
        <div id="scheduleWindows"></div>
        <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
          <button onclick="addScheduleRow()" style="padding:4px 10px;font-size:12px" class="secondary">+ Add Window</button>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="color:var(--muted);font-size:12px">Timezone</span>
            <input id="scheduleTz" type="text" value="Asia/Shanghai"
              style="width:140px;padding:4px 6px;border:1px solid var(--line);border-radius:6px;font:inherit;font-size:12px" />
          </div>
          <button onclick="saveSchedule()" style="padding:4px 10px;font-size:12px">Save</button>
          <button onclick="clearSchedule()" style="padding:4px 10px;font-size:12px" class="secondary">Clear (24/7)</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Contacts</h2>
      </div>
      <div id="detailContacts" style="display:flex;gap:8px;flex-wrap:wrap"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Mailbox History</h2>
        <div style="display:flex;align-items:center;gap:8px">
          <select id="historyContact" onchange="refreshDetailHistory()" style="padding:3px 6px;border:1px solid var(--line);border-radius:6px;font:inherit;font-size:12px">
            <option value="human">human</option>
          </select>
          <span class="meta">Latest 50 messages</span>
        </div>
      </div>
      <div id="detailHistory" class="history"></div>
    </section>

    <section id="sendMessagePanel" class="panel">
      <h2>Send Message</h2>
      <textarea id="detailMessage" placeholder="Type message..."></textarea>
      <div class="row">
        <button id="detailSendBtn" onclick="detailSend()">Send</button>
        <span id="detailSendResult" class="meta"></span>
      </div>
    </section>
  </div>
</main>

<!-- ══════════ Create Modal ══════════ -->
<div id="createModal" class="modal-overlay hidden" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal">
    <h2>Create New Agent</h2>
    <div class="form-group">
      <label>Goal *</label>
      <textarea id="createGoal" placeholder="Agent's task goal" style="min-height:60px"></textarea>
    </div>
    <div class="form-group">
      <label>First Instruction *</label>
      <textarea id="createFirstInstruction" placeholder="Agent's first concrete instruction" style="min-height:80px"></textarea>
    </div>
    <div class="form-group">
      <label>Provider *</label>
      <select id="createProvider">
        <option value="claude">Claude</option>
        <option value="codex">Codex</option>
      </select>
    </div>
    <div class="form-group">
      <label>Workdir *</label>
      <input id="createWorkdir" type="text" placeholder="/Users/tom/agents/my-agent" />
    </div>
    <div class="form-group">
      <label>Agent Name (optional)</label>
      <input id="createAgentName" type="text" placeholder="auto-derived from workdir" />
    </div>
    <div class="form-group">
      <label>Interval (minutes)</label>
      <input id="createInterval" type="text" value="20" />
    </div>
    <div class="form-group">
      <label>Tags (comma-separated)</label>
      <input id="createTags" type="text" placeholder="security, auth" />
    </div>
    <div class="row">
      <button onclick="doCreate()">Create</button>
      <button class="secondary" onclick="document.getElementById('createModal').classList.add('hidden')">Cancel</button>
      <span id="createResult" class="meta"></span>
    </div>
  </div>
</div>

<!-- ══════════ Import Modal ══════════ -->
<div id="importModal" class="modal-overlay hidden" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal">
    <h2>Import Existing Agent</h2>
    <div class="form-group">
      <label>Workdir *</label>
      <input id="importWorkdir" type="text" placeholder="/Users/tom/agents/existing-agent" />
    </div>
    <div class="form-group">
      <label>Tags (comma-separated)</label>
      <input id="importTags" type="text" placeholder="imported" />
    </div>
    <div class="row">
      <button onclick="doImport()">Import</button>
      <button class="secondary" onclick="document.getElementById('importModal').classList.add('hidden')">Cancel</button>
      <span id="importResult" class="meta"></span>
    </div>
  </div>
</div>

<script>
// ── State ──
let currentView = 'dashboard';
let currentAgent = null;
let autoSyncTimer = null;
let openDropdown = null;
let pointerDown = false;

function nowText() {
  return new Date().toLocaleTimeString();
}

function hasActiveSelection() {
  const sel = window.getSelection ? window.getSelection() : null;
  return !!(sel && !sel.isCollapsed && String(sel).trim());
}

function isEditableElement(el) {
  return !!(el && el.closest && el.closest('textarea, input, select, [contenteditable="true"]'));
}

function shouldPauseSync() {
  return pointerDown || hasActiveSelection() || isEditableElement(document.activeElement);
}

// ── View switching ──
function showDashboard() {
  currentView = 'dashboard';
  currentAgent = null;
  document.getElementById('dashboardView').classList.remove('hidden');
  document.getElementById('detailView').classList.add('hidden');
  refreshDashboard({ force: true });
}

function showDetail(name) {
  currentView = 'detail';
  currentAgent = name;
  document.getElementById('dashboardView').classList.add('hidden');
  document.getElementById('detailView').classList.remove('hidden');
  document.getElementById('detailName').textContent = name;
  refreshDetail({ force: true });
  loadSchedule();
}

function showCreateModal() {
  document.getElementById('createModal').classList.remove('hidden');
  document.getElementById('createResult').textContent = '';
}

function showImportModal() {
  document.getElementById('importModal').classList.remove('hidden');
  document.getElementById('importResult').textContent = '';
}

// ── Helpers ──
function stateBadge(status) {
  if (!status) return { text: 'unknown', cls: 'off' };
  const s = status.state;
  if (s === 'off_hours') return { text: 'off hours', cls: 'offhours' };
  if (s === 'stopped') return { text: 'stopped', cls: 'off' };
  if (status.awaiting_human) return { text: 'awaiting human', cls: 'wait' };
  if (s === 'running' && status.runner_alive) return { text: 'running', cls: 'on' };
  if (s === 'running') return { text: 'stale', cls: 'warn' };
  return { text: s || 'unknown', cls: 'off' };
}

function closeAllDropdowns() {
  document.querySelectorAll('.dropdown').forEach(d => d.remove());
  openDropdown = null;
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.agent-card-menu')) {
    closeAllDropdowns();
  }
});

document.addEventListener('mousedown', (e) => {
  if (e.button === 0) {
    pointerDown = true;
  }
});

document.addEventListener('mouseup', () => {
  setTimeout(() => {
    pointerDown = false;
  }, 0);
});

document.addEventListener('dragend', () => {
  pointerDown = false;
});

// ── Dashboard ──
async function refreshDashboard(options = {}) {
  if (!options.force && shouldPauseSync()) {
    document.getElementById('syncMeta').textContent = 'Sync paused while selecting';
    return;
  }
  try {
    const [agentsResp, rlResp] = await Promise.all([
      fetch('/api/agents'),
      fetch('/api/ratelimit'),
    ]);
    const agentsData = await agentsResp.json();
    const rlData = await rlResp.json();

    const agents = agentsData.agents || [];
    renderAgentCards(agents);
    renderRateLimit(rlData);
    refreshConnections(agents);
    document.getElementById('syncMeta').textContent = `Last sync ${nowText()}`;
  } catch (err) {
    document.getElementById('syncMeta').textContent = 'Sync failed';
  }
}

function renderAgentCards(agents) {
  const grid = document.getElementById('agentsGrid');
  grid.innerHTML = '';

  const running = agents.filter(a => a.status && a.status.state === 'running' && a.status.runner_alive).length;
  document.getElementById('agentCount').textContent = `Active: ${running} / ${agents.length} agents`;

  for (const agent of agents) {
    const card = document.createElement('div');
    card.className = 'agent-card';
    card.onclick = (e) => {
      if (hasActiveSelection()) return;
      if (e.target.closest('.agent-card-menu')) return;
      showDetail(agent.name);
    };

    const badge = stateBadge(agent.status);
    const lastHb = agent.status ? agent.status.last_heartbeat : 'none';
    const lastMsg = agent.status ? agent.status.last_message : '';
    const tags = (agent.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');

    card.innerHTML = `
      <div class="agent-card-top">
        <span class="agent-card-name">${esc(agent.name)}</span>
        <span class="badge ${badge.cls}">${badge.text}</span>
      </div>
      <div class="agent-card-info">${esc(agent.provider || '?')} &middot; ${agent.interval || '?'}min &middot; ${esc(lastHb)}</div>
      ${agent.goal ? `<div class="agent-card-info" style="font-style:italic">${esc((agent.goal || '').substring(0, 80))}</div>` : ''}
      ${lastMsg ? `<div class="agent-card-msg">${esc(lastMsg)}</div>` : ''}
      ${tags ? `<div class="agent-card-tags">${tags}</div>` : ''}
      <div class="agent-card-actions" onclick="event.stopPropagation()">
        ${badge.text === 'stopped' || badge.text === 'stale'
          ? `<button class="card-btn start" onclick="cardStart('${esc(agent.name)}')">Start</button>`
          : `<button class="card-btn" onclick="cardAction('${esc(agent.name)}','stop')">Stop</button>`
        }
        <button class="card-btn danger" onclick="cardDelete('${esc(agent.name)}')">Delete</button>
      </div>
    `;
    grid.appendChild(card);
  }
}

function toggleCardMenu(e, name) {
  e.stopPropagation();
  const menuBtn = e.target.closest('.agent-card-menu');

  if (openDropdown === name) {
    closeAllDropdowns();
    return;
  }
  closeAllDropdowns();

  const dd = document.createElement('div');
  dd.className = 'dropdown';
  dd.innerHTML = `
    <button class="dropdown-item" onclick="cardAction('${esc(name)}','stop')">Stop</button>
    <button class="dropdown-item danger" onclick="cardDelete('${esc(name)}')">Delete</button>
  `;
  menuBtn.appendChild(dd);
  openDropdown = name;
}

async function cardAction(name, action) {
  closeAllDropdowns();
  const url = `/api/agents/${encodeURIComponent(name)}/${action}`;
  const opts = { method: 'POST', headers: { 'Content-Type': 'application/json' } };
  try {
    const resp = await fetch(url, opts);
    const data = await resp.json();
    if (!resp.ok) {
      alert('Failed: ' + (data.error || 'unknown error'));
    }
  } catch (err) { /* ignore */ }
  setTimeout(refreshDashboard, 500);
}

async function cardStart(name) {
  closeAllDropdowns();
  try {
    const resp = await fetch(`/api/agents/${encodeURIComponent(name)}/start`, { method: 'POST' });
    const data = await resp.json();
    if (!resp.ok) {
      alert('Start failed: ' + (data.error || 'unknown') + (data.stderr ? '\n' + data.stderr : ''));
    }
  } catch (err) { /* ignore */ }
  setTimeout(refreshDashboard, 1500);
}

async function cardDelete(name) {
  closeAllDropdowns();
  if (!confirm(`Delete agent "${name}"?\n\nThis will STOP the agent and DELETE its entire working directory. This cannot be undone.`)) {
    return;
  }
  try {
    const resp = await fetch(`/api/agents/${encodeURIComponent(name)}/delete`, { method: 'POST' });
    const data = await resp.json();
    if (!resp.ok) {
      alert('Delete failed: ' + (data.error || 'unknown error'));
    }
  } catch (err) { /* ignore */ }
  setTimeout(refreshDashboard, 500);
}

function renderRateLimit(data) {
  const panel = document.getElementById('rateLimitPanel');
  if (!data.claude) {
    panel.classList.add('hidden');
    return;
  }
  panel.classList.remove('hidden');
  const cl = data.claude;
  const status = cl.status || 'unknown';

  const statusMap = {
    'allowed':         { css: 'ok',      label: 'Normal' },
    'allowed_warning': { css: 'warning', label: 'Approaching Limit' },
    'rejected':        { css: 'danger',  label: 'Rate Limited' },
  };
  const mapped = statusMap[status] || { css: 'ok', label: status };

  document.getElementById('rlDot').className = 'rl-dot ' + mapped.css;
  document.getElementById('rlStatusLabel').textContent = mapped.label;

  const typeText = cl.rate_limit_type ? `Window: ${cl.rate_limit_type.replace(/_/g, ' ')}` : '';
  document.getElementById('rlType').textContent = typeText;

  let resetText = '';
  if (cl.resets_at) {
    const d = new Date(cl.resets_at * 1000);
    resetText = 'Resets at ' + d.toLocaleTimeString();
  }
  document.getElementById('rlReset').textContent = resetText;
  document.getElementById('rlSource').textContent = `Source: ${cl.source_agent || '?'} · ${cl.last_updated || ''}`;
}

// ── Detail Page ──
async function refreshDetail(options = {}) {
  if (!currentAgent) return;
  if (!options.force && shouldPauseSync()) {
    document.getElementById('syncMeta').textContent = 'Sync paused while selecting';
    return;
  }
  const contact = document.getElementById('historyContact').value || 'human';
  try {
    const [statusResp, historyResp, contactsResp] = await Promise.all([
      fetch(`/api/agents/${encodeURIComponent(currentAgent)}/status`),
      fetch(`/api/agents/${encodeURIComponent(currentAgent)}/history?limit=50&contact=${encodeURIComponent(contact)}`),
      fetch(`/api/agents/${encodeURIComponent(currentAgent)}/contacts`),
    ]);
    const statusData = await statusResp.json();
    const historyData = await historyResp.json();
    const contactsData = await contactsResp.json();

    renderDetailStatus(statusData);
    renderDetailHistory(historyData.messages || []);

    // Update contacts display and selector
    const contacts = contactsData.contacts || [];
    const container = document.getElementById('detailContacts');
    container.innerHTML = '';
    const select = document.getElementById('historyContact');
    const currentVal = select.value;
    select.innerHTML = '';
    for (const c of contacts) {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.textContent = `${c.name} (${c.type})`;
      container.appendChild(tag);

      const opt = document.createElement('option');
      opt.value = c.name;
      opt.textContent = c.name;
      select.appendChild(opt);
    }
    select.value = contacts.some(c => c.name === currentVal) ? currentVal : 'human';
    updateSendPanel();
  } catch (err) { /* ignore */ }
}

function renderDetailStatus(data) {
  const status = data.status || {};
  const badge = stateBadge(status);

  const badgeEl = document.getElementById('detailBadge');
  badgeEl.textContent = badge.text;
  badgeEl.className = 'badge ' + badge.cls;

  document.getElementById('detailHeartbeat').textContent = `Last heartbeat: ${status.last_heartbeat || 'none'}`;

  const isStopped = badge.text === 'stopped' || badge.text === 'stale';
  const startBtn = document.getElementById('detailStartBtn');
  const stopBtn = document.getElementById('detailStopBtn');

  startBtn.classList.toggle('hidden', !isStopped);
  stopBtn.classList.toggle('hidden', isStopped);

  const facts = document.getElementById('detailFacts');
  facts.innerHTML = '';
  const items = [
    ['Provider', data.provider || '-'],
    ['State', status.state || '-'],
    ['Runner PID', status.runner_pid || '-'],
    ['Awaiting Human', status.awaiting_human ? 'YES' : 'NO'],
  ];

  // Update interval input only if not focused
  const intervalInput = document.getElementById('intervalInput');
  if (intervalInput && document.activeElement !== intervalInput) {
    intervalInput.value = data.interval || 20;
  }

  for (const [label, value] of items) {
    const el = document.createElement('div');
    el.className = 'detail-fact';
    el.innerHTML = `<span>${esc(label)}</span><strong>${esc(String(value))}</strong>`;
    facts.appendChild(el);
  }
}

function renderDetailHistory(messages) {
  const root = document.getElementById('detailHistory');
  const shouldStick = root.scrollHeight - root.scrollTop - root.clientHeight < 80;

  root.innerHTML = '';
  for (const item of messages) {
    const sender = item.from || item.role || '';
    const isHuman = sender === 'human';
    const wrap = document.createElement('div');
    wrap.className = `msg ${isHuman ? 'human' : 'agent'}`;

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = `${item.ts} · ${sender}${item.to ? ' → ' + item.to : ''} · ${item.task_id}`;
    wrap.appendChild(meta);

    const bubble = document.createElement('div');
    bubble.className = `bubble ${isHuman ? 'human' : 'agent'}`;
    bubble.textContent = item.message;
    wrap.appendChild(bubble);

    root.appendChild(wrap);
  }

  if (shouldStick) {
    root.scrollTop = root.scrollHeight;
  }
}

function updateSendPanel() {
  const contact = document.getElementById('historyContact').value;
  const isHuman = (contact === 'human');
  const panel = document.getElementById('sendMessagePanel');
  const textarea = document.getElementById('detailMessage');
  const btn = document.getElementById('detailSendBtn');
  textarea.disabled = !isHuman;
  btn.disabled = !isHuman;
  panel.style.opacity = isHuman ? '1' : '0.5';
  textarea.placeholder = isHuman ? 'Type message...' : 'Cannot send messages to agent-to-agent conversations';
}

async function refreshDetailHistory() {
  if (!currentAgent) return;

    const resp = await fetch(`/api/agents/${encodeURIComponent(currentAgent)}/history?limit=50&contact=${encodeURIComponent(contact)}`);

// ── Work Schedule ──
const DAY_LABELS = ['', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

function addScheduleRow(days, start, end) {
  const container = document.getElementById('scheduleWindows');
  const row = document.createElement('div');
  row.className = 'sched-row';

  const activeDays = new Set(days || [1,2,3,4,5]);

  let dayHtml = '';
  for (let d = 1; d <= 7; d++) {
    dayHtml += `<span class="sched-day ${activeDays.has(d) ? 'active' : ''}" data-day="${d}" onclick="this.classList.toggle('active')">${DAY_LABELS[d]}</span>`;
  }

  row.innerHTML = `
    ${dayHtml}
    <input type="time" class="sched-start" value="${start || '09:00'}" />
    <span>-</span>
    <input type="time" class="sched-end" value="${end || '18:00'}" />
    <span class="sched-del" onclick="this.parentElement.remove()">&times;</span>
  `;
  container.appendChild(row);
}

function collectSchedule() {
  const rows = document.querySelectorAll('#scheduleWindows .sched-row');
  const windows = [];
  for (const row of rows) {
    const days = [];
    row.querySelectorAll('.sched-day.active').forEach(el => {
      days.push(parseInt(el.dataset.day));
    });
    const start = row.querySelector('.sched-start').value;
    const end = row.querySelector('.sched-end').value;
    if (days.length > 0 && start && end) {
      windows.push({ days, start, end });
    }
  }
  return windows;
}

async function loadSchedule() {
  if (!currentAgent) return;
  const container = document.getElementById('scheduleWindows');
  container.innerHTML = '';
  try {
    const resp = await fetch(`/api/agents/${encodeURIComponent(currentAgent)}/schedule`);
    const data = await resp.json();
    if (data.schedule && data.schedule.windows && data.schedule.windows.length > 0) {
      document.getElementById('scheduleTz').value = data.schedule.timezone || 'UTC';
      for (const w of data.schedule.windows) {
        addScheduleRow(w.days, w.start, w.end);
      }
    }
  } catch (err) { /* ignore */ }
}

async function saveSchedule() {
  if (!currentAgent) return;
  const result = document.getElementById('scheduleResult');
  const windows = collectSchedule();
  const timezone = document.getElementById('scheduleTz').value.trim() || 'UTC';

  if (windows.length === 0) {
    result.textContent = 'Add at least one window, or use Clear for 24/7';
    return;
  }

  result.textContent = 'Saving...';
  try {
    const resp = await fetch(`/api/agents/${encodeURIComponent(currentAgent)}/schedule`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ schedule: { timezone, windows } }),
    });
    const data = await resp.json();
    if (!resp.ok) { result.textContent = 'Failed: ' + (data.error || 'unknown'); return; }
    result.textContent = 'Saved';
    setTimeout(() => { result.textContent = ''; }, 2000);
  } catch (err) { result.textContent = 'Failed'; }
}

async function clearSchedule() {
  if (!currentAgent) return;
  const result = document.getElementById('scheduleResult');

  try {
    const resp = await fetch(`/api/agents/${encodeURIComponent(currentAgent)}/schedule`, {

  const val = parseInt(input.value);
  if (!val || val < 1) { result.textContent = 'Must be >= 1'; return; }
  result.textContent = 'Saving...';
  try {
    const resp = await fetch(`/api/agents/${encodeURIComponent(currentAgent)}/interval`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ interval: val }),
    });
    const data = await resp.json();
    if (!resp.ok) { result.textContent = 'Failed: ' + (data.error || 'unknown'); return; }
    result.textContent = 'Saved';
    input.blur();
    setTimeout(() => { result.textContent = ''; }, 2000);
  } catch (err) { result.textContent = 'Failed'; }
}

// ── Create / Import ──
async function doCreate() {
  const result = document.getElementById('createResult');
  result.textContent = 'Creating...';

  const goal = document.getElementById('createGoal').value.trim();
  const firstInstruction = document.getElementById('createFirstInstruction').value.trim();
  const provider = document.getElementById('createProvider').value;
  const workdir = document.getElementById('createWorkdir').value.trim();
  const agentName = document.getElementById('createAgentName').value.trim();
  const interval = parseInt(document.getElementById('createInterval').value) || 20;
  const tags = document.getElementById('createTags').value.split(',').map(s => s.trim()).filter(Boolean);

  if (!goal || !firstInstruction || !workdir) {
    result.textContent = 'Goal, first instruction, and workdir are required';
    return;
  }

  try {
    const resp = await fetch('/api/agents/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        goal,
        first_instruction: firstInstruction,
        provider,
        workdir,
        agent_name: agentName,
        interval,
        tags,
      }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      result.textContent = 'Error: ' + (data.error || 'create failed');
      if (data.stderr) result.textContent += '\n' + data.stderr;
      return;
    }
    document.getElementById('createModal').classList.add('hidden');
    refreshDashboard();
  } catch (err) {
    result.textContent = 'Create failed: ' + err.message;
  }
}

async function doImport() {
  const result = document.getElementById('importResult');
  result.textContent = 'Importing...';

  const workdir = document.getElementById('importWorkdir').value.trim();
  const tags = document.getElementById('importTags').value.split(',').map(s => s.trim()).filter(Boolean);

  if (!workdir) {
    result.textContent = 'Workdir is required';
    return;
  }

  try {
    const resp = await fetch('/api/agents/import', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ workdir, tags }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      result.textContent = 'Error: ' + (data.error || 'import failed');
      return;
    }
    document.getElementById('importModal').classList.add('hidden');
    refreshDashboard();
  } catch (err) {
    result.textContent = 'Import failed: ' + err.message;
  }
}

// ── Auto Sync ──
function toggleAutoSync() {
  const enabled = document.getElementById('autoSync').checked;
  if (!enabled) {
    if (autoSyncTimer) { clearInterval(autoSyncTimer); autoSyncTimer = null; }
    document.getElementById('syncMeta').textContent = 'Auto sync off';
    return;
  }
  if (autoSyncTimer) clearInterval(autoSyncTimer);
  const interval = document.hidden ? 5000 : 2000;
  autoSyncTimer = setInterval(() => {
    if (!document.getElementById('autoSync').checked) return;
    if (shouldPauseSync()) {
      document.getElementById('syncMeta').textContent = 'Sync paused while selecting';
      return;
    }
    if (currentView === 'dashboard') refreshDashboard();
    else if (currentView === 'detail') refreshDetail();
  }, interval);
}

document.addEventListener('visibilitychange', () => {
  if (document.getElementById('autoSync').checked) {
    toggleAutoSync();
  }
});

// ── Escape HTML ──
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Connections ──
async function refreshConnections(agents) {
  const selA = document.getElementById('connAgentA');
  const selB = document.getElementById('connAgentB');
  const prevA = selA.value;
  const prevB = selB.value;
  const names = agents.map(a => a.name);

  selA.innerHTML = names.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('');
  selB.innerHTML = names.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('');
  if (prevA && names.includes(prevA)) selA.value = prevA;
  if (prevB && names.includes(prevB)) selB.value = prevB;
  else if (names.length > 1) selB.selectedIndex = 1;

  // Collect all connections
  const connections = new Map();
  for (const agent of agents) {
    try {
      const resp = await fetch(`/api/agents/${encodeURIComponent(agent.name)}/contacts`);
      const data = await resp.json();
      for (const c of (data.contacts || [])) {
        if (c.type !== 'agent') continue;
        const key = [agent.name, c.name].sort().join(' <-> ');
        if (!connections.has(key)) {
          connections.set(key, { a: [agent.name, c.name].sort()[0], b: [agent.name, c.name].sort()[1] });
        }
      }
    } catch { /* ignore */ }
  }

  const list = document.getElementById('connList');
  list.innerHTML = '';
  document.getElementById('connCount').textContent = `${connections.size} connections`;

  for (const [key, { a, b }] of connections) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px';
    row.innerHTML = `
      <span>${esc(a)} &harr; ${esc(b)}</span>
      <button onclick="doDisconnect('${esc(a)}','${esc(b)}')" style="padding:2px 8px;font-size:11px" class="warn">Disconnect</button>
    `;
    list.appendChild(row);
  }
}

async function doConnect() {
  const a = document.getElementById('connAgentA').value;
  const b = document.getElementById('connAgentB').value;
  const result = document.getElementById('connResult');
  if (!a || !b || a === b) { result.textContent = 'Select two different agents'; return; }
  result.textContent = 'Connecting...';
  try {
    const resp = await fetch('/api/mailbox/connect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent_a: a, agent_b: b }),
    });
    const data = await resp.json();
    if (!resp.ok) { result.textContent = 'Error: ' + (data.error || 'failed'); return; }
    result.textContent = 'Connected';
    setTimeout(() => { result.textContent = ''; refreshDashboard(); }, 1000);
  } catch (err) { result.textContent = 'Failed'; }
}

async function doDisconnect(a, b) {
  if (!confirm(`Disconnect ${a} and ${b}?`)) return;
  try {
    const resp = await fetch('/api/mailbox/disconnect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent_a: a, agent_b: b }),
    });
    if (resp.ok) refreshDashboard();
  } catch { /* ignore */ }
}

// ── Init ──
refreshDashboard({ force: true });
toggleAutoSync();
</script>
